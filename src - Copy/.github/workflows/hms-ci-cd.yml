name: HMS CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  DOTNET_VERSION: '8.0.x'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/hms

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - PatientService
          - EncounterService
          - InpatientService
          - EmergencyService
          - DiagnosticsService
          - RevenueService
          - AuditService
          - AiService
          - ApiGateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/Hms.${{ matrix.service }}/Hms.${{ matrix.service }}.csproj

      - name: Build
        run: dotnet build src/Hms.${{ matrix.service }}/Hms.${{ matrix.service }}.csproj -c Release --no-restore

      - name: Run unit tests
        run: dotnet test src/Hms.Tests/Hms.Tests.csproj --filter Category=${{ matrix.service }} --no-build -c Release

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Run security scan (dotnet-security)
        run: |
          dotnet tool install --global security-scan
          security-scan src/

  docker-build:
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]
    if: github.event_name == 'push'
    strategy:
      matrix:
        service:
          - PatientService
          - EncounterService
          - InpatientService
          - EmergencyService
          - DiagnosticsService
          - RevenueService
          - AuditService
          - AiService
          - ApiGateway
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          file: ./src/Hms.${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest

  deploy-staging:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: |
          helm upgrade --install hms-staging infrastructure/helm/ \
            --namespace hms-staging \
            --set global.image.tag=${{ github.sha }} \
            --values infrastructure/helm/values-staging.yaml

  deploy-production:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: |
          helm upgrade --install hms-prod infrastructure/helm/ \
            --namespace hms-production \
            --set global.image.tag=${{ github.sha }} \
            --values infrastructure/helm/values-production.yaml