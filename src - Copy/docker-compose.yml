version: '3.9'

services:
  # ─── Infrastructure ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hms_dev_pw}
      POSTGRES_DB: hms
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hms"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    ports: ["9092:9092"]
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./infrastructure/prometheus:/etc/prometheus
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:10.4.0
    volumes:
      - ./infrastructure/grafana:/etc/grafana/provisioning/dashboards
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}

  # ─── HMS Microservices ──────────────────────────────
  patientservice:
    build:
      context: ./src
      dockerfile: Hms.PatientService/Dockerfile
    ports: ["5101:5101"]
    environment:
      - ConnectionStrings__Default=Host=postgres;Database=hms;Username=hms;Password=${POSTGRES_PASSWORD:-hms_dev_pw}
      - Kafka__BootstrapServers=kafka:9092
      - Redis__ConnectionString=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
  encounterservice:
    build:
      context: ./src
      dockerfile: Hms.EncounterService/Dockerfile
    ports: ["5102:5102"]
    environment:
      - ConnectionStrings__Default=Host=postgres;Database=hms;Username=hms;Password=${POSTGRES_PASSWORD:-hms_dev_pw}
      - Kafka__BootstrapServers=kafka:9092
      - Redis__ConnectionString=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
  inpatientservice:
    build:
      context: ./src
      dockerfile: Hms.InpatientService/Dockerfile
    ports: ["5103:5103"]
    environment:
      - ConnectionStrings__Default=Host=postgres;Database=hms;Username=hms;Password=${POSTGRES_PASSWORD:-hms_dev_pw}
      - Kafka__BootstrapServers=kafka:9092
      - Redis__ConnectionString=redis:6379
