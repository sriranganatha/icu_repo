```yaml
openapi: 3.1.0
info:
  title: HMS InpatientService API
  description: API specification for the Hospital Management System (HMS) Inpatient Service, managing patient admissions and eligibility verifications.
  version: 1.0.0
  contact:
    name: API Support
    email: support@hms-healthcare.com

servers:
  - url: /api/v1
    description: Main API Server

tags:
  - name: Admission
    description: Operations related to patient admissions (FHIR Encounter)
  - name: AdmissionEligibility
    description: Operations related to admission insurance eligibility (FHIR CoverageEligibilityResponse)

paths:
  /admissions:
    get:
      tags:
        - Admission
      summary: List Admissions
      description: Retrieves a paginated list of admissions.
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/SkipQuery'
        - $ref: '#/components/parameters/TakeQuery'
      responses:
        '200':
          description: A paginated list of admissions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Admission'
                  totalCount:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    post:
      tags:
        - Admission
      summary: Create Admission
      description: Creates a new patient admission record.
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdmissionCreateRequest'
      responses:
        '201':
          description: Admission created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Admission'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /admissions/{id}:
    get:
      tags:
        - Admission
      summary: Get Admission by ID
      description: Retrieves a specific admission record by its ID.
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Admission details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Admission'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    put:
      tags:
        - Admission
      summary: Update Admission
      description: Updates an existing admission record.
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdmissionUpdateRequest'
      responses:
        '200':
          description: Admission updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Admission'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /admission-eligibilities:
    get:
      tags:
        - AdmissionEligibility
      summary: List Admission Eligibilities
      description: Retrieves a paginated list of admission eligibility verifications.
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/SkipQuery'
        - $ref: '#/components/parameters/TakeQuery'
      responses:
        '200':
          description: A paginated list of admission eligibilities.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdmissionEligibility'
                  totalCount:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    post:
      tags:
        - AdmissionEligibility
      summary: Create Admission Eligibility
      description: Creates a new admission eligibility verification request.
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdmissionEligibilityCreateRequest'
      responses:
        '201':
          description: Admission eligibility created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdmissionEligibility'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /admission-eligibilities/{id}:
    get:
      tags:
        - AdmissionEligibility
      summary: Get Admission Eligibility by ID
      description: Retrieves a specific admission eligibility record by its ID.
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Admission eligibility details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdmissionEligibility'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    put:
      tags:
        - AdmissionEligibility
      summary: Update Admission Eligibility
      description: Updates an existing admission eligibility record.
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdmissionEligibilityUpdateRequest'
      responses:
        '200':
          description: Admission eligibility updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdmissionEligibility'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

components:
  parameters:
    TenantIdHeader:
      name: X-Tenant-Id
      in: header
      description: The ID of the tenant (hospital/facility) making the request.
      required: true
      schema:
        type: string
        format: uuid
    SkipQuery:
      name: skip
      in: query
      description: Number of records to skip for pagination.
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    TakeQuery:
      name: take
      in: query
      description: Number of records to retrieve for pagination.
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    IdPath:
      name: id
      in: path
      description: Unique identifier of the entity.
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Authentication information is missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: The user does not have permission to access this resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: The request was well-formed but was unable to be followed due to semantic errors.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
          description: Application-specific error code.
        message:
          type: string
          description: Human-readable error message.
        details:
          type: array
          items:
            type: string

    Admission:
      type: object
      x-fhir-resource: Encounter
      description: Represents a patient's admission to the facility.
      properties:
        id:
          type: string
          format: uuid
        patientId:
          type: string
          format: uuid
          x-phi-classification: Restricted
          description: Identifier of the patient.
        admissionDate:
          type: string
          format: date-time
        dischargeDate:
          type: ["string", "null"]
          format: date-time
        attendingPhysicianId:
          type: string
          format: uuid
        diagnosis:
          type: string
          x-phi-classification: Restricted
          description: Primary diagnosis for the admission.
        status:
          type: string
          enum: [Planned, Arrived, InProgress, Discharged, Cancelled]
      required:
        - id
        - patientId
        - admissionDate
        - status

    AdmissionCreateRequest:
      type: object
      properties:
        patientId:
          type