```yaml
openapi: 3.1.0
info:
  title: HMS DiagnosticsService
  description: Healthcare Management System (HMS) API for managing diagnostic result records.
  version: 1.0.0
  contact:
    name: HMS API Support
    email: api-support@hms-example.com
servers:
  - url: /api/v1
    description: Main API Server

tags:
  - name: ResultRecord
    description: Operations related to diagnostic result records

paths:
  /result-records:
    get:
      tags:
        - ResultRecord
      summary: List Result Records
      description: Retrieves a paginated list of diagnostic result records.
      operationId: listResultRecords
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/SkipQuery'
        - $ref: '#/components/parameters/TakeQuery'
      responses:
        '200':
          description: A paginated list of result records.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ResultRecord'
                  totalCount:
                    type: integer
                    minimum: 0
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    post:
      tags:
        - ResultRecord
      summary: Create a Result Record
      description: Creates a new diagnostic result record.
      operationId: createResultRecord
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResultRecordCreateRequest'
      responses:
        '201':
          description: Result record created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /result-records/{id}:
    get:
      tags:
        - ResultRecord
      summary: Get Result Record by ID
      description: Retrieves a specific diagnostic result record by its unique identifier.
      operationId: getResultRecordById
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: The requested result record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    put:
      tags:
        - ResultRecord
      summary: Update a Result Record
      description: Updates an existing diagnostic result record.
      operationId: updateResultRecord
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResultRecordUpdateRequest'
      responses:
        '200':
          description: Result record updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

components:
  parameters:
    TenantIdHeader:
      name: X-Tenant-Id
      in: header
      description: The unique identifier of the tenant (clinic, hospital, or organization).
      required: true
      schema:
        type: string
        format: uuid
    SkipQuery:
      name: skip
      in: query
      description: Number of records to skip for pagination.
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    TakeQuery:
      name: take
      in: query
      description: Maximum number of records to return.
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    IdPath:
      name: id
      in: path
      description: The unique identifier of the entity.
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Authentication information is missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: The user does not have permission to access this resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: The request was well-formed but was unable to be followed due to semantic errors.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ResultRecord:
      type: object
      description: Represents a diagnostic result record.
      x-fhir-resource: DiagnosticReport
      required:
        - id
        - patientId
        - status
        - testCode
        - effectiveDateTime
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the result record.
        patientId:
          type: string
          format: uuid
          description: Identifier of the patient associated with the result.
          x-phi-classification: ePHI
          x-fhir-mapping: DiagnosticReport.subject
        practitionerId:
          type: string
          format: uuid
          description: Identifier of the ordering or performing practitioner.
          x-fhir-mapping: DiagnosticReport.performer
        status:
          type: string
          enum: [registered, partial, preliminary, final, amended, corrected, appended, cancelled, entered-in-error, unknown]
          description: The status of the diagnostic report.
          x-fhir-mapping: DiagnosticReport.status
        testCode:
          type: string
          description: LOINC or internal code representing the diagnostic test.
          x-fhir-mapping: DiagnosticReport.code
        testName:
          type: string
          description: Human-readable name of the diagnostic test.
        effectiveDateTime:
          type: string
          format: date-time
          description: The time or time-period the observed values are related to.
          x-phi-classification: ePHI
          x-fhir-mapping: DiagnosticReport.effectiveDateTime
        issuedDateTime:
          type: string
          format: date-time
          description: The date and time that this version of the report was made available to providers.
          x-fhir-mapping: DiagnosticReport.issued
        conclusion:
          type: string
          description: Clinical conclusion (interpretation) of the test results.
          x-phi-classification: ePHI
          x-fhir-mapping: DiagnosticReport.conclusion
        observations:
          type: array
          description: Specific observations/measurements associated with this report.
          x-fhir-mapping: DiagnosticReport.result (Observation)
          items:
            $ref: '#/components/schemas/Observation'

    ResultRecordCreateRequest:
      type: object
      description: DTO for creating a new Result Record.
      required:
        - patientId
        - status
        - testCode
        - effectiveDateTime
      properties:
        patientId:
          type: string
          format: uuid
          x-phi-classification: ePHI
        practitionerId:
          type: string
          format: uuid
        status:
          type: string
          enum: [registered, partial, preliminary, final, amended, corrected, appended, cancelled, entered-in-error, unknown]
        testCode:
          type: string
        testName:
          type: string
        effectiveDateTime:
          type: string
          format: date-time
          x-phi-classification: ePHI
        conclusion:
          type: string
          x-phi-classification: ePHI
        observations:
          type: array
          items:
            $ref: '#/components/schemas/Observation'

    ResultRecordUpdateRequest:
      type: object
      description: DTO for updating an existing Result Record.
      properties:
        practitionerId:
          type: string
          format: uuid
        status:
          type: string
          enum: [registered, partial, preliminary, final, amended, corrected, appended, cancelled, entered-in-error, unknown]
        testName:
          type: string
        conclusion:
          type: string
          x-phi-classification: ePHI
        observations:
          type: array
          items:
            $ref: '#/components/schemas/Observation'

    Observation:
      type: object
      description: A single measurement or observation within a diagnostic report.
      x-fhir-resource: Observation
      required:
        - code
        - value
      properties:
        code:
          type: string
          description: LOINC or internal code for the specific observation.
        name:
          type: string
          description: Human-readable name of the observation.
        value:
          type: string
          description: The result value (can be numeric string or qualitative text).
          x-phi-classification: ePHI
        unit:
          type: string
          description: Unit of measure.
        referenceRange:
          type: string
          description: Guidance on how to interpret the value by comparison to a normal or