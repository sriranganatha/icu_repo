      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
  inpatientservice:
    build:
      context: .
      dockerfile: src/GNex.InpatientService/Dockerfile
    ports: ["5103:5103"]
    environment:
      - ConnectionStrings__Default=Host=postgres;Database=gnex_db;Username=gnex_admin;Password=${POSTGRES_PASSWORD:-GNex@1234}
      - Kafka__BootstrapServers=kafka:9092
      - Redis__ConnectionString=redis:6379
