version: '3.9'

services:
  # ─── Infrastructure ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gnex_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-GNex@1234}
      POSTGRES_DB: gnex_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports: ["5418:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gnex_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports: ["9092:9092"]
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./infrastructure/prometheus:/etc/prometheus
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:10.4.0
    volumes:
      - ./infrastructure/grafana:/etc/grafana/provisioning/dashboards
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}

  # ─── GenesisNexus Microservices ──────────────────────────────
  patientservice:
    build:
      context: .
      dockerfile: src/GNex.PatientService/Dockerfile
    ports: ["5101:5101"]
    environment:
      - ConnectionStrings__Default=Host=postgres;Database=gnex_db;Username=gnex_admin;Password=${POSTGRES_PASSWORD:-GNex@1234}
      - Kafka__BootstrapServers=kafka:9092
      - Redis__ConnectionString=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
  encounterservice:
    build:
      context: .
      dockerfile: src/GNex.EncounterService/Dockerfile
    ports: ["5102:5102"]
    environment:
      - ConnectionStrings__Default=Host=postgres;Database=gnex_db;Username=gnex_admin;Password=${POSTGRES_PASSWORD:-GNex@1234}
      - Kafka__BootstrapServers=kafka:9092
      - Redis__ConnectionString=redis:6379
