version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5418:5432"
    environment:
      POSTGRES_USER: icu_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ICU@1234}
      POSTGRES_DB: icu_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U icu_admin"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafkadata:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  patient-api:
    build:
      context: .
      dockerfile: Hms.PatientService/Dockerfile
    ports:
      - "5101:8080"
    environment:
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=icu_db;Username=icu_admin;Password=${DB_PASSWORD:-ICU@1234}
      - Kafka__BootstrapServers=kafka:9092
      - TenantId=default
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  encounter-api:
