Here is the production-grade, multi-document Kubernetes YAML for your Healthcare Management System (HMS). 

It includes a dedicated `hms` namespace and provisions the Deployment, Service, HPA, PDB, and NetworkPolicy for all 9 services. The backend services are strictly isolated at the network level to only accept traffic from the API Gateway.

```yaml
apiVersion: v1
kind: Namespace
metadata:
  name: hms
  labels:
    environment: production
    system: healthcare-management

---
# ==========================================
# API GATEWAY (Port: 5100)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: hms
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: hms/api-gateway:latest
        ports:
        - containerPort: 5100
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health/liveness
            port: 5100
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/readiness
            port: 5100
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: hms
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
  - port: 5100
    targetPort: 5100
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: hms
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: hms
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: api-gateway
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-netpol
  namespace: hms
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
  - Ingress
  ingress:
  - ports:
    - protocol: TCP
      port: 5100
    # Allows external ingress (e.g., from NGINX Ingress Controller)

---
# ==========================================
# PATIENT SERVICE (Port: 5101)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: hms
  labels:
    app: patient-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      containers:
      - name: patient-service
        image: hms/patient-service:latest
        ports:
        - containerPort: 5101
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health/liveness
            port: 5101
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/readiness
            port: 5101
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
  namespace: hms
spec:
  type: ClusterIP
  selector:
    app: patient-service
  ports:
  - port: 5101
    targetPort: 5101
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: patient-service-hpa
  namespace: hms
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: patient-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: patient-service-pdb
  namespace: hms
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: patient-service
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: patient-service-netpol
  namespace: hms
spec:
  podSelector:
    matchLabels:
      app: patient-service
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: api-gateway
    ports:
    - protocol: TCP
      port: 5101

---
# ==========================================
# ENCOUNTER SERVICE (Port: 5102)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: encounter-service
  namespace: hms
  labels:
    app: encounter-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: encounter-service
  template:
    metadata:
      labels:
        app: encounter-service
    spec:
      containers:
      - name: encounter-service
        image: hms/encounter-service:latest
        ports:
        - containerPort: 5102
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health/liveness
            port: 5102
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/readiness
            port: 5102
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: encounter-service
  namespace: hms
spec:
  type: ClusterIP
  selector:
    app: encounter-service
  ports:
  - port: 5102
    targetPort: 5102
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: encounter-service-hpa
  namespace: hms
spec:
  scaleTargetRef:
    apiVersion: apps/v1